<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#7A1414" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- red / white target (background) -->
  <circle cx="256" cy="256" r="196" fill="#E23B3B"/>
  <circle cx="256" cy="256" r="157" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="118" fill="#E23B3B"/>
  <circle cx="256" cy="256" r="79"  fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="40"  fill="#E23B3B"/>

  <!-- amber resistor (foreground), tilted 45° rising to the right -->
  <g transform="rotate(-45 256 256)" filter="url(#lift)">
    <!-- white underlay to separate from the target -->
    <g fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
      <path d="M96 256 L168 256"/>
      <path d="M168 256 L182 216 L212 296 L242 216 L272 296 L302 216 L332 296 L346 256"/>
      <path d="M346 256 L418 256"/>
    </g>
    <!-- amber trace -->
    <g fill="none" stroke="#F5A623" stroke-width="17" stroke-linecap="round" stroke-linejoin="round">
      <path d="M96 256 L168 256"/>
      <path d="M168 256 L182 216 L212 296 L242 216 L272 296 L302 216 L332 296 L346 256"/>
      <path d="M346 256 L418 256"/>
    </g>
    <!-- terminal nodes -->
    <circle cx="96"  cy="256" r="14" fill="#F5A623" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="418" cy="256" r="14" fill="#F5A623" stroke="#FFFFFF" stroke-width="6"/>
  </g>
</svg>
