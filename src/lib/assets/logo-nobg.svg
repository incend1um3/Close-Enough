<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7A1414" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- red / white target (background) -->
  <circle cx="256" cy="256" r="196" fill="#E23B3B"/>
  <circle cx="256" cy="256" r="157" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="118" fill="#E23B3B"/>
  <circle cx="256" cy="256" r="79"  fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="40"  fill="#E23B3B"/>

  <!-- amber resistor (foreground), tilted 45 deg rising to the right -->
  <g transform="rotate(-45 256 256)" filter="url(#lift)">
    <!-- wide white moat to lift it off the target -->
    <g fill="none" stroke="#FFFFFF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round">
      <path d="M86 256 L160 256"/>
      <path d="M160 256 L184 210 L232 302 L280 210 L328 302 L352 256"/>
      <path d="M352 256 L426 256"/>
    </g>
    <!-- bold amber trace -->
    <g fill="none" stroke="#F5A623" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
      <path d="M86 256 L160 256"/>
      <path d="M160 256 L184 210 L232 302 L280 210 L328 302 L352 256"/>
      <path d="M352 256 L426 256"/>
    </g>
    <!-- terminal nodes -->
    <circle cx="86"  cy="256" r="19" fill="#F5A623" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="426" cy="256" r="19" fill="#F5A623" stroke="#FFFFFF" stroke-width="8"/>
  </g>
</svg>
